<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Sightmap — photo density</title>
<link href="https://unpkg.com/maplibre-gl@4.7.1/dist/maplibre-gl.css" rel="stylesheet" />
<script src="https://unpkg.com/maplibre-gl@4.7.1/dist/maplibre-gl.js"></script>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
<style>
  :root {
    --surface: #ffffff;
    --surface-2: #f7f7f7;
    --text-primary: #222222;
    --text-secondary: #717171;
    --border: #ebebeb;
    --accent: #ff385c;
    --accent-soft: #ffe4e9;
    --shadow: 0 6px 20px rgba(0, 0, 0, 0.12);
    --shadow-sm: 0 2px 8px rgba(0, 0, 0, 0.10);
    --grad-heat: linear-gradient(90deg, #c9b8f4, #f79ed7, #fb8bb0, #ff8a78, #ffb864, #ffe9a8);
    --grad-hex: linear-gradient(90deg, #fdeef0, #fbc4d0, #f793ab, #ee6f8e, #d94663);
  }
  [data-theme="dark"] {
    --surface: #222222;
    --surface-2: #2f2f2f;
    --text-primary: #ffffff;
    --text-secondary: #b0b0b0;
    --border: #3a3a3a;
    --accent: #ff5a76;
    --accent-soft: #4a2a31;
    --shadow: 0 6px 20px rgba(0, 0, 0, 0.45);
    --shadow-sm: 0 2px 8px rgba(0, 0, 0, 0.4);
    --grad-heat: linear-gradient(90deg, #3f0f5e, #a1179e, #e0369f, #f2703d, #fcc338, #fdf6b0);
    --grad-hex: linear-gradient(90deg, #3a1b3f, #7a2d63, #b0407d, #e0619a, #ffa3c4);
  }
  html, body { margin: 0; height: 100%; font-family: "Inter", system-ui, -apple-system, sans-serif; }
  #map { position: absolute; inset: 0; }
  button { font-family: inherit; }

  @keyframes panel-in {
    from { opacity: 0; transform: translateY(10px); }
    to { opacity: 1; transform: translateY(0); }
  }
  .panel {
    position: absolute; top: 16px; left: 16px; z-index: 10;
    background: var(--surface); color: var(--text-primary);
    border-radius: 16px; padding: 16px 18px; width: 250px;
    box-shadow: var(--shadow);
    animation: panel-in 0.45s cubic-bezier(0.2, 0.8, 0.2, 1) both;
  }
  .panel h1 { font-size: 17px; font-weight: 800; margin: 0 0 2px; letter-spacing: -0.02em; }
  .panel .sub { font-size: 12px; color: var(--text-secondary); margin: 0 0 14px; line-height: 1.45; }
  .row { display: flex; align-items: center; gap: 10px; margin-top: 12px; }
  .row label { font-size: 12px; font-weight: 500; color: var(--text-secondary); width: 58px; flex: none; }
  .row.disabled { opacity: 0.4; pointer-events: none; }
  .row, .row * { transition: opacity 0.25s ease; }

  select {
    flex: 1; font: inherit; font-size: 13px; font-weight: 600;
    color: var(--text-primary); background: var(--surface);
    border: 1px solid var(--border); border-radius: 999px;
    padding: 8px 12px; cursor: pointer; outline: none;
    transition: border-color 0.2s, box-shadow 0.2s;
  }
  select:hover { border-color: var(--text-primary); }
  select:focus-visible { box-shadow: 0 0 0 2px var(--accent-soft); }

  /* interest category chips */
  .chips { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 12px; }
  .chips button {
    font: inherit; font-size: 11.5px; font-weight: 600;
    padding: 5px 10px; border-radius: 999px;
    border: 1px solid var(--border); background: var(--surface);
    color: var(--text-primary); cursor: pointer;
    transition: background 0.18s ease, color 0.18s ease, border-color 0.18s ease, transform 0.18s ease;
  }
  .chips button:hover { border-color: var(--text-primary); transform: translateY(-1px); }
  .chips button.active {
    background: var(--text-primary); color: var(--surface); border-color: var(--text-primary);
  }

  /* segmented control with sliding thumb */
  .seg {
    position: relative; display: flex; flex: 1;
    background: var(--surface-2); border-radius: 999px; padding: 3px;
  }
  .seg .thumb {
    position: absolute; top: 3px; bottom: 3px; left: 3px; width: 40px;
    background: var(--surface); border-radius: 999px; box-shadow: var(--shadow-sm);
    transition: left 0.28s cubic-bezier(0.2, 0.8, 0.2, 1), width 0.28s cubic-bezier(0.2, 0.8, 0.2, 1);
  }
  .seg button {
    position: relative; z-index: 1; flex: 1; padding: 6px 0;
    font-size: 12px; font-weight: 600; color: var(--text-secondary);
    background: none; border: none; border-radius: 999px; cursor: pointer;
    transition: color 0.2s;
  }
  .seg button.active { color: var(--text-primary); }
  .seg button:not(.active):hover { color: var(--text-primary); }

  /* threshold slider */
  .slider-wrap { position: relative; flex: 1; display: flex; align-items: center; }
  input[type="range"] {
    width: 100%; margin: 0; -webkit-appearance: none; appearance: none;
    height: 4px; border-radius: 2px; background:
      linear-gradient(to right, var(--accent) 0%, var(--accent) var(--fill, 50%), var(--border) var(--fill, 50%), var(--border) 100%);
    outline: none; cursor: pointer;
  }
  input[type="range"]::-webkit-slider-thumb {
    -webkit-appearance: none; appearance: none;
    width: 18px; height: 18px; border-radius: 50%;
    background: var(--surface); border: 1px solid var(--border);
    box-shadow: var(--shadow-sm); cursor: grab;
    transition: transform 0.15s ease;
  }
  input[type="range"]::-webkit-slider-thumb:hover { transform: scale(1.15); }
  input[type="range"]:active::-webkit-slider-thumb { cursor: grabbing; transform: scale(1.15); }
  .bubble {
    position: absolute; top: -30px; transform: translateX(-50%);
    background: var(--text-primary); color: var(--surface);
    font-size: 11px; font-weight: 600; padding: 3px 8px; border-radius: 999px;
    opacity: 0; pointer-events: none; transition: opacity 0.2s;
    white-space: nowrap;
  }
  .slider-wrap:hover .bubble, .slider-wrap.dragging .bubble { opacity: 1; }

  /* legend chip, bottom-left */
  .legend {
    position: absolute; bottom: 28px; left: 16px; z-index: 10;
    background: var(--surface); border-radius: 999px;
    box-shadow: var(--shadow-sm); padding: 8px 14px;
    display: flex; align-items: center; gap: 10px;
    animation: panel-in 0.45s cubic-bezier(0.2, 0.8, 0.2, 1) 0.15s both;
  }
  .legend .bar { width: 110px; height: 6px; border-radius: 3px; background: var(--grad-heat); }
  body[data-view="hex"] .legend .bar { background: var(--grad-hex); }
  .legend span { font-size: 11px; font-weight: 500; color: var(--text-secondary); }

  .theme-toggle {
    position: absolute; top: 16px; right: 16px; z-index: 10;
    width: 42px; height: 42px; border-radius: 50%;
    background: var(--surface); color: var(--text-primary);
    border: none; box-shadow: var(--shadow-sm);
    font-size: 17px; cursor: pointer;
    transition: transform 0.2s cubic-bezier(0.2, 0.8, 0.2, 1), box-shadow 0.2s;
    animation: panel-in 0.45s cubic-bezier(0.2, 0.8, 0.2, 1) 0.1s both;
  }
  .theme-toggle:hover { transform: scale(1.08); box-shadow: var(--shadow); }
  .theme-toggle:active { transform: scale(0.95); }

  /* top-spots list panel (airbnb list <-> map duality) */
  .spots-panel {
    position: absolute; top: 74px; right: 16px; z-index: 10;
    background: var(--surface); color: var(--text-primary);
    border-radius: 16px; box-shadow: var(--shadow);
    width: 250px; max-height: min(58vh, 520px); overflow-y: auto;
    padding: 10px 8px;
    animation: panel-in 0.45s cubic-bezier(0.2, 0.8, 0.2, 1) 0.2s both;
  }
  .sp-head { font-size: 13px; font-weight: 800; padding: 4px 10px 8px; }
  .sp-row {
    display: flex; align-items: center; gap: 10px;
    padding: 8px 10px; border-radius: 10px; cursor: pointer;
    transition: background 0.15s ease;
  }
  .sp-row:hover { background: var(--surface-2); }
  .sp-rank { font-size: 11px; font-weight: 700; color: var(--text-secondary); width: 15px; text-align: right; flex: none; }
  .sp-dot { width: 8px; height: 8px; border-radius: 50%; flex: none; }
  .sp-name { font-size: 12.5px; font-weight: 600; flex: 1; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .sp-users { font-size: 11px; color: var(--text-secondary); flex: none; }
  .sp-empty { font-size: 12px; color: var(--text-secondary); padding: 4px 10px 8px; }

  /* hover card */
  .hovercard {
    position: absolute; z-index: 20; pointer-events: none;
    background: var(--surface); color: var(--text-primary);
    border-radius: 12px; box-shadow: var(--shadow);
    padding: 10px 14px; min-width: 150px;
    opacity: 0; transform: translateY(4px) scale(0.97);
    transition: opacity 0.15s ease, transform 0.15s cubic-bezier(0.2, 0.8, 0.2, 1);
  }
  .hovercard.show { opacity: 1; transform: translateY(0) scale(1); }
  .hovercard .hc-title { font-size: 13px; font-weight: 700; margin-bottom: 2px; }
  .hovercard .hc-sub { font-size: 11.5px; color: var(--text-secondary); margin-bottom: 7px; }
  .hovercard .hc-bar { height: 5px; border-radius: 3px; background: var(--surface-2); overflow: hidden; }
  .hovercard .hc-bar > div {
    height: 100%; border-radius: 3px; background: var(--grad-heat);
    transition: width 0.25s cubic-bezier(0.2, 0.8, 0.2, 1);
  }
  body[data-view="hex"] .hovercard .hc-bar > div { background: var(--grad-hex); }

  /* top-spot map pills */
  @keyframes pill-pop {
    0% { opacity: 0; transform: scale(0.3) translateY(8px); }
    70% { transform: scale(1.06) translateY(-1px); }
    100% { opacity: 1; transform: scale(1) translateY(0); }
  }
  .spot-pill {
    background: var(--surface); color: var(--text-primary);
    border-radius: 999px; padding: 6px 12px;
    font-family: "Inter", system-ui, sans-serif;
    font-size: 12px; font-weight: 700;
    max-width: 170px; overflow: hidden; text-overflow: ellipsis;
    box-shadow: var(--shadow-sm); cursor: pointer; white-space: nowrap;
    animation: pill-pop 0.4s cubic-bezier(0.2, 0.8, 0.2, 1) both;
    transition: transform 0.18s cubic-bezier(0.2, 0.8, 0.2, 1), box-shadow 0.18s;
  }
  .spot-pill:hover { transform: scale(1.1); box-shadow: var(--shadow); z-index: 5; }

  .maplibregl-ctrl-group { border-radius: 12px !important; box-shadow: var(--shadow-sm) !important; overflow: hidden; }
</style>
</head>
<body>
<div id="map"></div>

<div class="panel">
  <h1>Sightmap</h1>
  <p class="sub">Where people take photos — from 4.5M geotagged Flickr shots</p>
  <div class="row">
    <label for="city">City</label>
    <select id="city"></select>
  </div>
  <div class="chips" id="cats">
    <button data-cat="all" class="active">All</button>
    <button data-cat="golden">✨ Golden hour</button>
    <button data-cat="sunset">🌅 Sunset</button>
    <button data-cat="party">🎉 Party</button>
    <button data-cat="food">🍜 Food</button>
    <button data-cat="nature">🌳 Nature</button>
    <button data-cat="architecture">🏛️ Architecture</button>
    <button data-cat="art">🎨 Art</button>
  </div>
  <div class="row">
    <label>View</label>
    <div class="seg" id="view">
      <div class="thumb"></div>
      <button data-view="heat" class="active">Heatmap</button>
      <button data-view="hex">Hexes</button>
    </div>
  </div>
  <div class="row" id="minRow">
    <label for="minHeat">Min heat</label>
    <div class="slider-wrap" id="sliderWrap">
      <input type="range" id="minHeat" min="0" max="0.7" step="0.01" />
      <output class="bubble" id="minBubble"></output>
    </div>
  </div>
  <div class="row disabled" id="hexRow">
    <label>Hex size</label>
    <div class="seg" id="res">
      <div class="thumb"></div>
      <button data-res="auto" class="active">Auto</button>
      <button data-res="7">L</button>
      <button data-res="8">M</button>
      <button data-res="9">S</button>
    </div>
  </div>
</div>

<div class="legend">
  <span>quiet</span>
  <div class="bar"></div>
  <span>loved</span>
</div>

<button class="theme-toggle" id="themeToggle" aria-label="Toggle theme">◐</button>
<div class="hovercard" id="hovercard"></div>

<div class="spots-panel">
  <div class="sp-head">Top spots here</div>
  <div id="spotsList"></div>
</div>

<script>
const CITIES = ["helsinki", "paris", "london", "barcelona", "newyork"];
const CITY_LABELS = { helsinki: "Helsinki", paris: "Paris", london: "London", barcelona: "Barcelona", newyork: "New York" };
const STYLES = {
  light: "https://basemaps.cartocdn.com/gl/positron-gl-style/style.json",
  dark: "https://basemaps.cartocdn.com/gl/dark-matter-gl-style/style.json",
};
// hex ramps: pastel rose in light mode, glowing rose in dark
const RAMP = {
  light: ["#fdeef0", "#fbc4d0", "#f793ab", "#ee6f8e", "#d94663"],
  dark:  ["#3a1b3f", "#7a2d63", "#b0407d", "#e0619a", "#ffa3c4"],
};
// heat ramps: soft pastels in light mode, thermal in dark. Stops are
// front-loaded so sparse-but-real places still show.
const HEAT_STOPS = {
  light: [
    0.0, "rgba(201,184,244,0)",
    0.07, "#c9b8f4",
    0.16, "#f79ed7",
    0.32, "#fb8bb0",
    0.5, "#ff8a78",
    0.7, "#ffb864",
    0.88, "#ffe9a8",
  ],
  dark: [
    0.0, "rgba(63,15,94,0)",
    0.06, "#3f0f5e",
    0.14, "#a1179e",
    0.3, "#e0369f",
    0.48, "#f2703d",
    0.68, "#fcc338",
    0.88, "#fdf6b0",
  ],
};

// glow colors for regions of interest, by peak score
const GLOW = {
  light: ["#f6b6d4", "#ff9d8a", "#ffd08a"],
  dark:  ["#c2359f", "#f2703d", "#fcc338"],
};

let theme = window.matchMedia("(prefers-color-scheme: dark)").matches ? "dark" : "light";
let resMode = "auto";
let cityData = null;
let heatData = null;
let regionData = null;
let spotMarkers = [];

const params = new URLSearchParams(location.search);
let city = params.get("city") || CITIES[0];
let viewMode = params.get("view") === "hex" ? "hex" : "heat";
let heatThreshold = Math.min(0.7, Math.max(0, parseFloat(params.get("min") ?? "0.35") || 0));
const CATS = ["all", "golden", "sunset", "party", "food", "nature", "architecture", "art"];
let cat = CATS.includes(params.get("cat")) ? params.get("cat") : "all";

function urlState() {
  return `?city=${city}&view=${viewMode}&min=${heatThreshold}&cat=${cat}`;
}

const citySel = document.getElementById("city");
for (const c of CITIES) {
  const o = document.createElement("option");
  o.value = c; o.textContent = CITY_LABELS[c];
  citySel.appendChild(o);
}
citySel.value = city;

document.documentElement.dataset.theme = theme;
document.body.dataset.view = viewMode;

const map = new maplibregl.Map({
  container: "map",
  style: STYLES[theme],
  center: [24.94, 60.17],
  zoom: 12,
  attributionControl: { compact: true },
});
map.addControl(new maplibregl.NavigationControl(), "bottom-right");

function autoRes() {
  const z = map.getZoom();
  return z < 11.2 ? 7 : z < 13 ? 8 : 9;
}
function activeRes() {
  return resMode === "auto" ? autoRes() : Number(resMode);
}

function colorExpr() {
  const r = RAMP[theme];
  return ["interpolate", ["linear"], ["get", "score"],
    0.0, r[0], 0.25, r[1], 0.5, r[2], 0.75, r[3], 1.0, r[4]];
}

function heatColorExpr() {
  // compress the ramp into [threshold, 1]: everything below the user's
  // min-heat cutoff is fully transparent, the colors keep their order
  const t = heatThreshold;
  const src = HEAT_STOPS[theme];
  const stops = [];
  for (let i = 0; i < src.length; i += 2) {
    stops.push(t + src[i] * (1 - t), src[i + 1]);
  }
  return ["interpolate", ["linear"], ["heatmap-density"], ...stops];
}

function addLayers() {
  if (!cityData) return;
  if (map.getSource("hexes")) {
    map.getSource("hexes").setData(cityData);
    map.setPaintProperty("hex-fill", "fill-color", colorExpr());
    map.setPaintProperty("hex-line", "line-color", colorExpr());
  } else {
    map.addSource("hexes", { type: "geojson", data: cityData });
    map.addLayer({
      id: "hex-fill",
      type: "fill",
      source: "hexes",
      filter: ["==", ["get", "res"], activeRes()],
      paint: {
        "fill-color": colorExpr(),
        "fill-opacity": ["interpolate", ["linear"], ["get", "score"], 0, 0.25, 1, 0.75],
        "fill-opacity-transition": { duration: 300 },
      },
    });
    map.addLayer({
      id: "hex-line",
      type: "line",
      source: "hexes",
      filter: ["==", ["get", "res"], activeRes()],
      paint: { "line-color": colorExpr(), "line-opacity": 0.35, "line-width": 0.5 },
    });
  }
  if (map.getSource("heat")) {
    map.getSource("heat").setData(heatData);
    map.setPaintProperty("heat", "heatmap-color", heatColorExpr());
  } else {
    map.addSource("heat", { type: "geojson", data: heatData });
    map.addLayer({
      id: "heat",
      type: "heatmap",
      source: "heat",
      paint: {
        // w is already log-scaled 0..1 per res-10 cell with local contrast
        "heatmap-weight": ["get", "w"],
        "heatmap-intensity": ["interpolate", ["linear"], ["zoom"], 10, 1.0, 14, 1.2, 16, 1.4],
        // physical footprint stays ~450m+ from z12 up (radius doubles per
        // zoom level, down to block level) so hotspots stay merged
        "heatmap-radius": ["interpolate", ["exponential", 2], ["zoom"], 10, 7, 12, 20, 14, 80, 16, 340, 18, 1400],
        "heatmap-color": heatColorExpr(),
        // fade as you zoom in so streets read through the heat
        "heatmap-opacity": ["interpolate", ["linear"], ["zoom"], 11, 0.7, 14, 0.58, 16, 0.45],
      },
    });
  }
  if (map.getSource("regions")) {
    map.getSource("regions").setData(regionData);
    map.setPaintProperty("region-glow", "circle-color", glowColorExpr());
  } else {
    map.addSource("regions", { type: "geojson", data: regionData });
    map.addLayer({
      id: "region-glow",
      type: "circle",
      source: "regions",
      paint: {
        "circle-color": glowColorExpr(),
        "circle-blur": 1.4,
        "circle-opacity": ["case", ["==", ["get", "level"], "parent"], 0.4, 0.5],
        // r10 = pixel radius at z10 (set in loadCity); doubles per zoom
        // level so the glow footprint stays physically constant
        "circle-radius": ["interpolate", ["exponential", 2], ["zoom"],
          10, ["get", "r10"], 16, ["*", ["get", "r10"], 64]],
      },
    });
  }
  refreshFilter();
  applyView();
}

function glowColorExpr() {
  const g = GLOW[theme];
  return ["interpolate", ["linear"], ["get", "peak"],
    0.35, g[0], 0.7, g[1], 1.0, g[2]];
}

function applyView() {
  if (!map.getLayer("heat")) return;
  // hex-fill stays visible-but-transparent in heat mode so hover cards
  // keep working there (hidden layers can't be hit-tested)
  const hexMode = viewMode === "hex";
  map.setLayoutProperty("hex-fill", "visibility", "visible");
  map.setLayoutProperty("hex-line", "visibility", hexMode ? "visible" : "none");
  map.setPaintProperty("hex-fill", "fill-opacity",
    hexMode ? ["interpolate", ["linear"], ["get", "score"], 0, 0.25, 1, 0.75] : 0);
  map.setLayoutProperty("heat", "visibility", viewMode === "heat" ? "visible" : "none");
  if (map.getLayer("region-glow")) {
    map.setLayoutProperty("region-glow", "visibility", viewMode === "heat" ? "visible" : "none");
  }
}

function refreshFilter() {
  if (!map.getLayer("hex-fill")) return;
  const f = ["==", ["get", "res"], activeRes()];
  map.setFilter("hex-fill", f);
  map.setFilter("hex-line", f);
}

// ---- region pills (airbnb-style floating markers) ----
// parents (districts) label the map at city zoom; children (individual
// sights) take over as you zoom in
function updateSpots() {
  spotMarkers.forEach((m) => m.marker.remove());
  spotMarkers = [];
  if (!regionData) return;
  const feats = regionData.features;
  const withKids = new Set(
    feats.filter((f) => f.properties.level === "child").map((f) => f.properties.parent)
  );
  feats.forEach((f, i) => {
    const p = f.properties;
    // outer wrapper belongs to the Marker (it positions via transform);
    // the animated pill must be an inner element or the transforms clash
    const wrap = document.createElement("div");
    const el = document.createElement("div");
    el.className = "spot-pill";
    el.textContent = p.name || `📷 ${p.users}`;
    el.title = `${p.users} photographers`;
    el.style.animationDelay = `${Math.min(i, 8) * 60}ms`;
    wrap.appendChild(el);
    // pin the pill on the region's strongest cell so the label sits on
    // the sight it names, not the blob's geometric middle
    const center = Array.isArray(p.peak_at) ? p.peak_at : f.geometry.coordinates;
    el.addEventListener("click", (e) => {
      e.stopPropagation();
      map.flyTo({
        center,
        zoom: p.level === "parent" ? 14 : Math.max(map.getZoom() + 1.2, 15),
        duration: 1200,
        essential: true,
      });
    });
    const marker = new maplibregl.Marker({ element: wrap, anchor: "center" })
      .setLngLat(center)
      .addTo(map);
    spotMarkers.push({
      marker, el: wrap, lngLat: center, users: p.users,
      name: p.name, peak: p.peak,
      level: p.level, hasKids: withKids.has(p.id),
    });
  });
  updateSpotVisibility();
}

// label whatever is in view, best-evidenced places first, spread across
// the screen — a clump downtown can't hog every slot, so an isolated
// local gem (a zoo on its island) still gets its pill
function pickSpread(cands, cap, minPx) {
  const picked = [];
  for (const s of cands) {
    if (picked.length >= cap) break;
    const pt = map.project(s.lngLat);
    if (picked.every((q) => (q.x - pt.x) ** 2 + (q.y - pt.y) ** 2 > minPx * minPx)) {
      picked.push(Object.assign(pt, { s }));
    }
  }
  return picked.map((q) => q.s);
}

function updateSpotVisibility() {
  if (!spotMarkers.length) return;
  const z = map.getZoom();
  const b = map.getBounds();
  const inView = spotMarkers.filter((s) => b.contains(s.lngLat));
  const parents = pickSpread(
    inView
      .filter((s) => s.level === "parent" && (z < 13.4 || !s.hasKids))
      .sort((a, c) => c.users - a.users),
    12, 140
  );
  const children = z >= 13.4
    ? pickSpread(inView.filter((s) => s.level === "child").sort((a, c) => c.users - a.users), 14, 90)
    : [];
  const show = new Set([...parents, ...children]);
  for (const s of spotMarkers) s.el.style.display = show.has(s) ? "" : "none";
  updateSpotsList();
}
map.on("zoom", updateSpotVisibility);
map.on("moveend", updateSpotVisibility);

// ---- top-spots list, synced with the viewport ----
function peakColor(peak) {
  const g = GLOW[theme];
  return peak < 0.55 ? g[0] : peak < 0.85 ? g[1] : g[2];
}

const esc = (t) => String(t).replace(/[&<>"']/g, (c) =>
  ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;" }[c]));

function updateSpotsList() {
  const listEl = document.getElementById("spotsList");
  const z = map.getZoom();
  const b = map.getBounds();
  const seen = new Set();
  const rows = spotMarkers
    .filter((s) => b.contains(s.lngLat) && (z >= 13.4 || s.level === "parent"))
    .sort((a, c) => c.users - a.users)
    .filter((s) => {
      // a parent and its child sight can share a name (Louvre in Louvre)
      const k = s.name || Symbol();
      if (seen.has(k)) return false;
      seen.add(k);
      return true;
    })
    .slice(0, 10);
  if (!rows.length) {
    listEl.innerHTML = '<div class="sp-empty">Nothing here — zoom out or pan.</div>';
    return;
  }
  listEl.innerHTML = "";
  rows.forEach((s, i) => {
    const row = document.createElement("div");
    row.className = "sp-row";
    row.innerHTML =
      `<span class="sp-rank">${i + 1}</span>` +
      `<span class="sp-dot" style="background:${peakColor(s.peak)}"></span>` +
      `<span class="sp-name">${esc(s.name || "Unnamed spot")}</span>` +
      `<span class="sp-users">📷 ${s.users}</span>`;
    row.addEventListener("click", () => {
      map.flyTo({
        center: s.lngLat,
        zoom: s.level === "parent" ? 14 : Math.max(map.getZoom() + 1.2, 15),
        duration: 1200,
        essential: true,
      });
    });
    listEl.appendChild(row);
  });
}

const EMPTY = { type: "FeatureCollection", features: [] };

async function loadCategory(k) {
  const suffix = k === "all" ? "" : `_${k}`;
  const [heatResp, regResp] = await Promise.all([
    fetch(`data/${city}_heat${suffix}.geojson`),
    fetch(`data/${city}_regions${suffix}.geojson`),
  ]);
  heatData = heatResp.ok ? await heatResp.json() : EMPTY;
  regionData = regResp.ok ? await regResp.json() : EMPTY;
  // px radius at z10 for each region glow, clamped so importance is read
  // from color/label rather than raw blob area
  const lat = cityData ? cityData.properties.center[1] : map.getCenter().lat;
  const mpp10 = (156543.03392 * Math.cos((lat * Math.PI) / 180)) / 1024;
  for (const f of regionData.features) {
    const isParent = f.properties.level === "parent";
    const rpx = f.properties.radius_m / mpp10;
    f.properties.r10 = Math.min(isParent ? 9 : 4.5, Math.max(isParent ? 2.4 : 1.5, rpx));
  }
}

let firstLoad = true;
async function loadCity(c) {
  const resp = await fetch(`data/${c}.geojson`);
  if (!resp.ok) { alert(`No data for ${c} — run aggregate.py ${c}`); return; }
  cityData = await resp.json();
  await loadCategory(cat);
  const [lon, lat] = cityData.properties.center;
  if (firstLoad) {
    map.jumpTo({ center: [lon, lat], zoom: 12 });
    firstLoad = false;
  } else {
    map.flyTo({ center: [lon, lat], zoom: 12, duration: 2400, curve: 1.6, essential: true });
  }
  addLayers();
  updateSpots();
}

map.on("load", () => loadCity(city));
map.on("zoom", () => { if (resMode === "auto") refreshFilter(); });

citySel.addEventListener("change", () => {
  city = citySel.value;
  history.replaceState(null, "", urlState());
  loadCity(city);
});

// interest category chips
if (cat !== "all") {
  document.querySelectorAll("#cats button").forEach((b) =>
    b.classList.toggle("active", b.dataset.cat === cat));
}
document.querySelectorAll("#cats button").forEach((b) => {
  b.addEventListener("click", async () => {
    if (b.dataset.cat === cat) return;
    document.querySelectorAll("#cats button").forEach((x) => x.classList.remove("active"));
    b.classList.add("active");
    cat = b.dataset.cat;
    history.replaceState(null, "", urlState());
    await loadCategory(cat);
    addLayers();
    updateSpots();
  });
});

// ---- segmented controls with sliding thumb ----
function initSeg(segEl, onPick) {
  const thumb = segEl.querySelector(".thumb");
  const move = (btn) => {
    thumb.style.left = btn.offsetLeft + "px";
    thumb.style.width = btn.offsetWidth + "px";
  };
  segEl.querySelectorAll("button").forEach((b) => {
    b.addEventListener("click", () => {
      segEl.querySelectorAll("button").forEach((x) => x.classList.remove("active"));
      b.classList.add("active");
      move(b);
      onPick(b);
    });
  });
  // position after fonts/layout settle
  requestAnimationFrame(() => requestAnimationFrame(() => move(segEl.querySelector("button.active"))));
  return move;
}

initSeg(document.getElementById("view"), (b) => {
  viewMode = b.dataset.view;
  document.body.dataset.view = viewMode;
  document.getElementById("hexRow").classList.toggle("disabled", viewMode !== "hex");
  document.getElementById("minRow").classList.toggle("disabled", viewMode !== "heat");
  history.replaceState(null, "", urlState());
  applyView();
});

initSeg(document.getElementById("res"), (b) => {
  resMode = b.dataset.res;
  refreshFilter();
});

// restore initial view mode
if (viewMode === "hex") {
  const seg = document.getElementById("view");
  seg.querySelector('[data-view="heat"]').classList.remove("active");
  const hexBtn = seg.querySelector('[data-view="hex"]');
  hexBtn.classList.add("active");
  document.getElementById("hexRow").classList.remove("disabled");
  document.getElementById("minRow").classList.add("disabled");
  requestAnimationFrame(() => requestAnimationFrame(() => {
    const thumb = seg.querySelector(".thumb");
    thumb.style.left = hexBtn.offsetLeft + "px";
    thumb.style.width = hexBtn.offsetWidth + "px";
  }));
}

// ---- min-heat slider with value bubble ----
const minHeat = document.getElementById("minHeat");
const minBubble = document.getElementById("minBubble");
const sliderWrap = document.getElementById("sliderWrap");
function syncSlider() {
  const v = heatThreshold;
  const pct = (v / 0.7) * 100;
  minHeat.style.setProperty("--fill", pct + "%");
  minBubble.textContent = v.toFixed(2);
  minBubble.style.left = `calc(${pct}% + ${9 - (pct / 100) * 18}px)`;
}
minHeat.value = heatThreshold;
syncSlider();
minHeat.addEventListener("input", () => {
  heatThreshold = parseFloat(minHeat.value);
  syncSlider();
  history.replaceState(null, "", urlState());
  if (map.getLayer("heat")) {
    map.setPaintProperty("heat", "heatmap-color", heatColorExpr());
  }
});
minHeat.addEventListener("pointerdown", () => sliderWrap.classList.add("dragging"));
window.addEventListener("pointerup", () => sliderWrap.classList.remove("dragging"));

// ---- hover card (works in both views via the transparent hex layer) ----
const hovercard = document.getElementById("hovercard");
map.on("mousemove", (e) => {
  if (!map.getLayer("hex-fill")) return;
  const feats = map.queryRenderedFeatures(e.point, { layers: ["hex-fill"] });
  if (feats.length) {
    const p = feats[0].properties;
    hovercard.innerHTML =
      `<div class="hc-title">${p.users} photographer${p.users === 1 ? "" : "s"}</div>` +
      `<div class="hc-sub">${p.photos} photos here</div>` +
      `<div class="hc-bar"><div style="width:${Math.round(p.score * 100)}%"></div></div>`;
    hovercard.style.left = Math.min(e.point.x + 16, window.innerWidth - 190) + "px";
    hovercard.style.top = e.point.y + 16 + "px";
    hovercard.classList.add("show");
    map.getCanvas().style.cursor = "pointer";
  } else {
    hovercard.classList.remove("show");
    map.getCanvas().style.cursor = "";
  }
});

// click a hotspot to glide in closer
map.on("click", (e) => {
  if (!map.getLayer("hex-fill") || map.getZoom() >= 15.5) return;
  const feats = map.queryRenderedFeatures(e.point, { layers: ["hex-fill"] });
  if (feats.length) {
    map.flyTo({ center: e.lngLat, zoom: map.getZoom() + 1.6, duration: 900, essential: true });
  }
});

document.getElementById("themeToggle").addEventListener("click", () => {
  theme = theme === "light" ? "dark" : "light";
  document.documentElement.dataset.theme = theme;
  map.setStyle(STYLES[theme]);
  const readd = () => {
    if (map.isStyleLoaded()) addLayers();
    else setTimeout(readd, 100);
  };
  map.once("styledata", readd);
});
</script>
